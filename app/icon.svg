<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#030712"/>
  <!-- Derrick legs -->
  <line x1="16" y1="5" x2="7" y2="26" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="5" x2="25" y2="26" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Cross brace -->
  <line x1="10" y1="18" x2="22" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="6" y1="26" x2="26" y2="26" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown -->
  <circle cx="16" cy="5" r="2" fill="#f59e0b"/>
</svg>
